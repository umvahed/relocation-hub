name: IND Monitor — Weekly Reset

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 08:00 CEST / 07:00 CET (GitHub Actions runs UTC)
  workflow_dispatch:      # Manual trigger for testing

jobs:
  weekly-reset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger weekly reset on Railway
        env:
          RAILWAY_URL: ${{ secrets.RAILWAY_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python3 .github/scripts/ind_monitor.py
