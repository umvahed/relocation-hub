name: IND Monitor

on:
  schedule:
    - cron: '0 6 * * *'  # 08:00 CEST / 07:00 CET — GitHub Actions runs in UTC
  workflow_dispatch:      # Manual trigger for testing

jobs:
  check-slots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch IND OAP slots and notify Railway
        env:
          RAILWAY_URL: ${{ secrets.RAILWAY_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python3 .github/scripts/ind_monitor.py
