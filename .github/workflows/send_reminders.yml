name: Send Task Reminders

on:
  schedule:
    # Every day at 07:00 UTC (09:00 CET summer, 08:00 CET winter)
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Send pending task reminders
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RAILWAY_URL }}/api/reminders/send" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          echo "Response code: $RESPONSE"
          if [ "$RESPONSE" -ne 200 ]; then
            echo "Failed with HTTP $RESPONSE"
            exit 1
          fi
