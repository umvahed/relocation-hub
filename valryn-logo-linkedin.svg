<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#13111e"/>
      <stop offset="100%" stop-color="#0d0b15"/>
    </linearGradient>
    <linearGradient id="vmark" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="35%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="fold" x1="0%" y1="0%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Subtle glow behind mark -->
  <ellipse cx="256" cy="265" rx="130" ry="110" fill="#4f46e5" opacity="0.12" filter="url(#glow)"/>

  <!-- Left arm main body -->
  <polygon points="155,112 248,112 282,392 196,392" fill="url(#vmark)"/>

  <!-- Fold piece — top-left of left arm -->
  <polygon points="114,112 155,112 147,155 120,172" fill="url(#fold)" opacity="0.92"/>

  <!-- Right arm -->
  <polygon points="228,384 276,384 406,128 358,112" fill="url(#vmark)"/>
</svg>
